<svg width="650" height="34" viewBox="0 0 650 34" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-size: 18px;
      fill: #1a1a1a;
      text-anchor: middle;
    }
    .l1 { animation: line1 9s ease-in-out infinite; }
    .l2 { animation: line2 9s ease-in-out infinite; }
    .l3 { animation: line3 9s ease-in-out infinite; }
    @keyframes line1 {
      0%   { opacity: 1; }
      27%  { opacity: 1; }
      33%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes line2 {
      0%   { opacity: 0; }
      33%  { opacity: 0; }
      36%  { opacity: 1; }
      60%  { opacity: 1; }
      66%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes line3 {
      0%   { opacity: 0; }
      66%  { opacity: 0; }
      69%  { opacity: 1; }
      93%  { opacity: 1; }
      99%  { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
  <text x="325" y="22" class="l1">성실하게 배우고, 트렌드는 발 빠르게</text>
  <text x="325" y="22" class="l2">AI 모델링부터 백엔드 아키텍처까지</text>
  <text x="325" y="22" class="l3">새로운 도구는 가장 먼저 써보는 편입니다</text>
</svg>
